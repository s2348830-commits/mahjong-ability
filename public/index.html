<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>能力・麻雀 (Mahjong Ability)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-screen">
        <h1>Mahjong Ability</h1>
        <button id="btn-create-room">部屋を作成</button>
        <button id="btn-join-room">部屋に参加</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="game-info">
            <span>残り牌: <span id="tiles-left">--</span></span>
            <span>ドラ: <span id="dora-indicators"></span></span>
        </div>
        
        <div id="game-board">
            <div id="my-discards" class="discard-area"></div>
        </div>

        <div id="my-hand-container">
            <div id="my-hand" class="hand-area"></div>
        </div>
        
        <div id="action-panel" style="display: none;">
            <button id="btn-tsumo">ツモ</button>
            <button id="btn-ron">ロン</button>
            <button id="btn-pon">ポン</button>
            <button id="btn-pass">パス</button>
        </div>
    </div>

    <script src="network.js"></script>
    <script src="mahjongRenderer.js"></script>
    <script src="ui.js"></script>
    <script src="client.js"></script>
</body>
</html>
